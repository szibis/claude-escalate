name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64
            target: linux
            arch: amd64
          - os: ubuntu-latest
            name: linux-arm64
            target: linux
            arch: arm64
          - os: macos-latest
            name: macos-amd64
            target: darwin
            arch: amd64
          - os: macos-latest
            name: macos-arm64
            target: darwin
            arch: arm64
          - os: windows-latest
            name: windows-amd64
            target: windows
            arch: amd64

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Build
      env:
        GOOS: ${{ matrix.target }}
        GOARCH: ${{ matrix.arch }}
      run: |
        mkdir -p dist
        if [ "${{ matrix.target }}" = "windows" ]; then
          go build -o dist/escalation-manager.exe ./cmd/escalation-cli/main.go
        else
          go build -o dist/escalation-manager ./cmd/escalation-cli/main.go
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: escalation-manager-${{ matrix.name }}
        path: dist/

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v3
      with:
        path: release-artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: release-artifacts/**/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
