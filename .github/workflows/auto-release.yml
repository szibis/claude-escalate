name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip if this commit is from the release bot itself
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    steps:
      - name: Find merged PR
        id: find_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_MSG=$(gh api "repos/${{ github.repository }}/commits/${COMMIT_SHA}" \
            --jq '.commit.message' 2>/dev/null | head -1 || echo "")

          PR_NUMBER=""
          if echo "$COMMIT_MSG" | grep -qE '\(#[0-9]+\)'; then
            PR_NUMBER=$(echo "$COMMIT_MSG" | grep -oE '#[0-9]+' | tail -1 | tr -d '#')
          fi

          if [ -z "$PR_NUMBER" ]; then
            PR_JSON=$(gh api "repos/${{ github.repository }}/commits/${COMMIT_SHA}/pulls" \
              --jq '[.[] | select(.merged_at != null)] | first // empty' 2>/dev/null || echo "")
            if [ -n "$PR_JSON" ]; then
              PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
            fi
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "No merged PR found, skipping release"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          REPO="${{ github.repository }}"
          PR_TITLE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title --jq '.title' 2>/dev/null || echo "")
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Determine version bump
        id: version
        if: steps.find_pr.outputs.skip != 'true'
        run: |
          TITLE="${{ steps.find_pr.outputs.pr_title }}"
          TITLE_LOWER=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]')

          if echo "$TITLE_LOWER" | grep -qE '^feat!:|breaking'; then
            BUMP="major"
          elif echo "$TITLE_LOWER" | grep -qE '^feat'; then
            BUMP="minor"
          elif echo "$TITLE_LOWER" | grep -qE '^(fix|perf|refactor)'; then
            BUMP="patch"
          else
            echo "No release-worthy prefix, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        if: steps.version.outputs.skip != 'true'
        with:
          fetch-depth: 0

      - name: Calculate new version
        id: new_version
        if: steps.version.outputs.skip != 'true'
        run: |
          CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT=${CURRENT#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}

          case "${{ steps.version.outputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Set up Go
        if: steps.version.outputs.skip != 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build cross-platform binaries
        if: steps.version.outputs.skip != 'true'
        run: |
          VERSION=${{ steps.new_version.outputs.version }}
          LDFLAGS="-s -w -X github.com/szibis/claude-escalate/internal/config.Version=${VERSION}"

          for PAIR in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS=${PAIR%/*}
            GOARCH=${PAIR#*/}
            OUTPUT="claude-escalate-${VERSION}-${GOOS}-${GOARCH}"
            echo "Building ${OUTPUT}..."
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build \
              -ldflags "$LDFLAGS" -o dist/${OUTPUT} ./cmd/claude-escalate
            chmod +x dist/${OUTPUT}
          done
          ls -la dist/

      - name: Create tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.new_version.outputs.version }}
          git push origin ${{ steps.new_version.outputs.version }}

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.new_version.outputs.version }} \
            dist/* \
            --title "${{ steps.new_version.outputs.version }}" \
            --generate-notes

      - name: Set up Docker Buildx
        if: steps.version.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.version.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.version.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ steps.new_version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.new_version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
