name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions you've considered

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Detection (frustration/circular reasoning)
        - Escalation (model switching)
        - De-escalation (auto-downgrade)
        - Classification (task type)
        - Prediction (historical learning)
        - Dashboard (web UI)
        - CLI (stats/commands)
        - Other
