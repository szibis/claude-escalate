version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - copyloopvar
    - goprintffuncname
    - gosec
    - misspell
    - nolintlint
    - unparam
    - whitespace
  settings:
    misspell:
      locale: US
    gosec:
      excludes:
        - G104
        - G304

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
