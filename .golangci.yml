run:
  timeout: 5m

linters:
  enable:
    - govet
    - ineffassign
    - staticcheck
    - bodyclose
    - copyloopvar
    - goprintffuncname
    - misspell
    - nolintlint
    - unparam
    - whitespace
    - gosec
  disable:
    - errcheck
    - unused

linters-settings:
  misspell:
    locale: US

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
