version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - copyloopvar
    - gofmt
    - goimports
    - goprintffuncname
    - gosec
    - misspell
    - nolintlint
    - stylecheck
    - unparam
    - whitespace
  settings:
    misspell:
      locale: US
    staticcheck:
      checks: ["all"]
    stylecheck:
      checks: ["all", "-ST1000", "-ST1003", "-ST1016", "-ST1005"]
    gosec:
      excludes:
        - G104
        - G304

issues:
  exclude-files:
    - _test\.go
  max-issues-per-linter: 50
  max-same-issues: 10
