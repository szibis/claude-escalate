# Claude Escalate v4.1.0 Configuration Example
# Complete configuration with all optimization layers and metrics

gateway:
  port: 8080
  host: 0.0.0.0
  security_layer: true
  shutdown_timeout_seconds: 30
  max_request_size_bytes: 10485760  # 10MB
  data_dir: ~/.claude-escalate/data

optimizations:
  rtk:
    enabled: true
    command_proxy_savings: 99.4
    models:
      low_effort: haiku
      medium_effort: sonnet
      high_effort: opus
    cache_savings: true

  mcp:
    enabled: true
    tools:
      - type: web_scraping
        name: scrapling
        settings:
          css_selector: true
          markdown_only: true
          cache_responses: true
      - type: code_analysis
        name: builtin_lsp
        settings:
          use_lsp: true
          cache_symbols: true
      - type: database
        name: builtin_sql
        settings:
          prepared_statements: true

  semantic_cache:
    enabled: true
    embedding_model: all-MiniLM-L6-v2
    similarity_threshold: 0.85
    hit_rate_target: 60
    false_positive_limit: 0.5
    max_cache_size_mb: 1024

  knowledge_graph:
    enabled: false  # Requires Phase 2
    index_local_code: true
    index_web_content: false
    cache_lookups: true
    db_path: ~/.claude-escalate/graph.db

  input_optimization:
    enabled: true
    strip_unused_tools: true
    compress_parameters: true
    dedup_exact_requests: true

  output_optimization:
    enabled: true
    response_compression: true
    field_filtering: true
    delta_detection: true

  batch_api:
    enabled: false  # For non-interactive workflows
    min_batch_size: 10
    max_batch_size: 100
    auto_batch_similar: true

intent_detection:
  enabled: true
  cache_bypass_patterns:
    - --no-cache
    - --fresh
    - "!"
    - "(no cache)"
    - "(bypass)"
  personalization:
    learn_from_feedback: true
    adapt_per_user: true
    feedback_history_depth: 90

security:
  enabled: true  # ALWAYS on, cannot be disabled
  sql_injection_detection: true
  xss_prevention: true
  command_injection_detection: true
  rate_limiting:
    requests_per_minute: 1000
    per_ip: true
  audit_logging: true

metrics:
  enabled: true
  publish_to:
    prometheus:
      enabled: true
      port: 9090
      path: /metrics

    grafana:
      enabled: false
      url: http://localhost:3000

    cloudwatch:
      enabled: false
      namespace: claude-escalate

    opentelemetry:
      enabled: false
      exporter_type: otlp  # otlp, jaeger, or prometheus
      otlp_endpoint: http://localhost:4317  # OTLP/gRPC receiver
      jaeger_endpoint: http://localhost:14268/api/traces  # Jaeger HTTP
      service_name: claude-escalate
      service_version: v4.1.0
      environment: production
      batch_size: 512
      batch_timeout_ms: 5000
      headers:
        Authorization: "Bearer YOUR_API_KEY"  # Optional

    debug_logs:
      enabled: true
      dir: ~/.claude-escalate/metrics

  track:
    cache_hit_rate:
      enabled: true
      interval: 60s
    cache_false_positive_rate:
      enabled: true
      interval: 60s
      alert_if_above: 0.5  # Kill cache if >0.5%
    token_savings_percent:
      enabled: true
      interval: 60s
    latency_by_layer:
      enabled: true
      interval: 60s
    per_optimization_savings:
      enabled: true
      interval: 300s
    security_events:
      enabled: true
      interval: 300s
    cost_tracking:
      enabled: true
      interval: 3600s

thresholds:
  cache_similarity: 0.85
  confidence_scores:
    high: 0.95
    medium: 0.75
    low: 0.5
  model_accuracy: 0.90

keywords:
  detail:
    - detailed
    - comprehensive
    - explain
    - why
    - how
    - understand
  quick:
    - quick
    - brief
    - summary
    - tl;dr
    - just
  follow_up:
    - more
    - also
    - additionally
    - what about
    - furthermore

signals:
  urgency:
    - urgent
    - asap
    - immediately
    - critical
  exploration:
    - what if
    - try
    - experiment
    - compare
  learning:
    - understand
    - explain
    - teach
    - learn

token_limits:
  max_input_tokens: 200000
  max_output_tokens: 4096
  haiku_max_output: 256
  sonnet_max_output: 2048
  opus_max_output: 4096

timeouts:
  cache_lookup_ms: 50
  intent_detection_ms: 100
  security_validation_ms: 20
  total_gateway_overhead_ms: 200
  freshness_check_ms: 10

paths:
  cache_dir: ~/.claude-escalate/cache
  logs_dir: ~/.claude-escalate/logs
  db_path: ~/.claude-escalate/data.db

models:
  haiku: claude-haiku-4-5-20251001
  sonnet: claude-sonnet-4-6
  opus: claude-opus-4-7
